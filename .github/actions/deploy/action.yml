name: Deploy Friendminton
description: Deploy an exact Friendminton commit to an existing Docker host

inputs:
  aws-region:
    description: AWS region containing the ECR repository
    required: true
  aws-role-arn:
    description: GitHub OIDC role used to authenticate to AWS
    required: true
  ecr-registry:
    description: ECR registry hostname
    required: true
  environment:
    description: Deployment environment name
    required: true
  host:
    description: SSH host
    required: true
  known-hosts:
    description: Pinned SSH known_hosts entry
    required: true
  path:
    description: Friendminton deployment directory on the server
    required: true
  private-key:
    description: SSH private key
    required: true
  public-base-url:
    description: Public API URL used for the post-deploy health check
    required: true
  sha:
    description: Exact Git commit represented by the image
    required: true
  image:
    description: Immutable container image to deploy
    required: true
  user:
    description: SSH user
    required: true

runs:
  using: composite
  steps:
    - name: Authenticate to AWS with GitHub OIDC
      uses: aws-actions/configure-aws-credentials@v6
      with:
        aws-region: ${{ inputs.aws-region }}
        role-to-assume: ${{ inputs.aws-role-arn }}

    - name: Configure SSH
      shell: bash
      env:
        DEPLOY_KNOWN_HOSTS: ${{ inputs.known-hosts }}
        DEPLOY_PRIVATE_KEY: ${{ inputs.private-key }}
      run: |
        set -euo pipefail
        install -d -m 700 "$HOME/.ssh"
        printf '%s\n' "$DEPLOY_PRIVATE_KEY" > "$HOME/.ssh/friendminton_deploy"
        printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
        chmod 600 "$HOME/.ssh/friendminton_deploy" "$HOME/.ssh/known_hosts"

    - name: Deploy immutable image to server
      shell: bash
      env:
        AWS_REGION: ${{ inputs.aws-region }}
        DEPLOY_ECR_REGISTRY: ${{ inputs.ecr-registry }}
        DEPLOY_ENVIRONMENT: ${{ inputs.environment }}
        DEPLOY_HOST: ${{ inputs.host }}
        DEPLOY_IMAGE: ${{ inputs.image }}
        DEPLOY_PATH: ${{ inputs.path }}
        DEPLOY_SHA: ${{ inputs.sha }}
        DEPLOY_USER: ${{ inputs.user }}
      run: |
        set -euo pipefail
        ./scripts/deploy-release.sh

    - name: Verify health
      shell: bash
      env:
        PUBLIC_BASE_URL: ${{ inputs.public-base-url }}
      run: |
        set -euo pipefail
        for attempt in {1..12}; do
          if curl --fail --silent --show-error "$PUBLIC_BASE_URL/healthz"; then
            exit 0
          fi
          sleep 5
        done
        exit 1
