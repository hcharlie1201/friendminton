name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing staging-approved release tag (for example v0.1.0)
        required: true
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  resolve:
    name: Resolve tagged release
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.release.outputs.sha }}
      tag: ${{ steps.release.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: release
        name: Validate release tag
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Tag must look like v0.1.0 or v0.1.0-rc.1" >&2
            exit 1
          fi
          git fetch --force origin "refs/tags/$RELEASE_TAG:refs/tags/$RELEASE_TAG"
          if [[ "$(git cat-file -t "refs/tags/$RELEASE_TAG")" != "tag" ]]; then
            echo "Production requires an annotated staging release tag" >&2
            exit 1
          fi
          echo "sha=$(git rev-parse "refs/tags/$RELEASE_TAG^{commit}")" >> "$GITHUB_OUTPUT"
          echo "tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"

  deploy:
    name: Deploy tagged release
    needs: resolve
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: production
      url: ${{ vars.PUBLIC_BASE_URL }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.sha }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
      - id: image
        name: Verify release image
        env:
          ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ needs.resolve.outputs.sha }}
        run: |
          set -euo pipefail
          aws ecr describe-images \
            --repository-name "$ECR_REPOSITORY" \
            --image-ids "imageTag=$IMAGE_TAG" >/dev/null
      - uses: ./.github/actions/deploy
        with:
          aws-region: ${{ vars.AWS_REGION }}
          aws-role-arn: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          ecr-registry: ${{ vars.ECR_REGISTRY }}
          environment: production
          host: ${{ secrets.DEPLOY_HOST }}
          known-hosts: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
          path: ${{ vars.DEPLOY_PATH }}
          private-key: ${{ secrets.DEPLOY_SSH_KEY }}
          public-base-url: ${{ vars.PUBLIC_BASE_URL }}
          sha: ${{ needs.resolve.outputs.sha }}
          image: ${{ vars.ECR_REGISTRY }}/${{ vars.ECR_REPOSITORY }}:${{ needs.resolve.outputs.sha }}
          user: ${{ vars.DEPLOY_USER }}
