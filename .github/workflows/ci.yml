name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
  workflow_call:
    inputs:
      ref:
        description: Exact Git ref to verify
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ inputs.ref || github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: postgres://friendminton:friendminton@localhost:5432/friendminton
    services:
      postgres:
        image: postgis/postgis:17-3.5-alpine
        env:
          POSTGRES_USER: friendminton
          POSTGRES_PASSWORD: friendminton
          POSTGRES_DB: friendminton
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U friendminton -d friendminton"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref || github.sha }}
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96.1
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --check
      - name: Lint
        run: cargo clippy --all-targets -- -D warnings
      - name: Test
        run: cargo test --locked

  mobile:
    name: Mobile
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref || github.sha }}
      - uses: pnpm/action-setup@v6
        with:
          version: 10.13.1
          run_install: false
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: mobile/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm run typecheck

  container:
    name: Container
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref || github.sha }}
      - name: Validate deployment scripts
        run: |
          test -x scripts/deploy-release.sh
          test -x scripts/deploy-on-host.sh
          test -x scripts/test-deploy-on-host.sh
          bash -n scripts/*.sh
          scripts/test-deploy-on-host.sh
      - name: Validate staging Compose configuration
        run: API_IMAGE=friendminton-api:ci docker compose --env-file .env.staging.example -f docker-compose.prod.yml config --quiet
      - name: Validate production Compose configuration
        run: API_IMAGE=friendminton-api:ci docker compose --env-file .env.production.example -f docker-compose.prod.yml config --quiet
      - name: Build API image
        run: docker build --tag friendminton-api:ci .

  terraform:
    name: Terraform
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref || github.sha }}
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.15.8
      - name: Check formatting
        run: terraform fmt -check -recursive infra
      - name: Validate stacks
        run: |
          set -euo pipefail
          for stack in state-bootstrap shared staging production; do
            terraform -chdir="infra/$stack" init -backend=false -input=false
            terraform -chdir="infra/$stack" validate
          done
