services:
  api:
    image: ${API_IMAGE:?API_IMAGE is required}
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:?APP_ENV is required}
      DATABASE_URL: ${DATABASE_URL}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:?PUBLIC_BASE_URL is required}
      SERVER_ADDR: ${SERVER_ADDR:-0.0.0.0:3000}
      RUST_LOG: ${RUST_LOG:-friendminton=info,tower_http=info}
      AWS_REGION: ${AWS_REGION:-us-west-2}
      GOOGLE_PLACES_API_KEY: ${GOOGLE_PLACES_API_KEY:?GOOGLE_PLACES_API_KEY is required}
      S3_BUCKET: ${S3_BUCKET}
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "3000"

  postgres:
    image: postgis/postgis:17-3.5-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - api
    environment:
      DOMAIN: ${DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
