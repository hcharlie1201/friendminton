services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: friendminton
      POSTGRES_USER: friendminton
      POSTGRES_PASSWORD: friendminton
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U friendminton -d friendminton"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
